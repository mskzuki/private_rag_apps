services:
  db:
    build:
      context: ./backend
      dockerfile: docker/db/Dockerfile.local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_pass
      - POSTGRES_DB=rag_dev
    volumes:
      - db_data:/var/lib/postgresql/data
      # 初回起動時のみ実行される初期化スクリプト。rag_devに加え、テスト専用DB rag_testをここで作成
      - ./backend/docker/db/initdb:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: docker/api/Dockerfile.local
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      # .envのDB_HOST既定値(localhost)はコンテナ外(ホストでの単体実行)用であり、
      # コンテナ内からのlocalhostはapiコンテナ自身を指してしまうため上書きが必須（DB_PORT/DB_USER/DB_PASS/DB_NAMEは.envの値をそのまま使う）
      - DB_HOST=db
      # REDIS_URLの既定値(redis://localhost:6379/0)はコンテナ外(ホストでの単体実行)用であり、
      # コンテナ内からのlocalhostはapiコンテナ自身を指してしまうため上書きが必須（dbと同じパターン）
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/seed:/app/seed
      - ./backend/src:/app/src
      # Devcontainerからこのapiコンテナにアタッチしてテストを編集・実行する際に必要
      - ./backend/tests:/app/tests
      # make ingest-gdriveをこのサービス経由（docker compose run）で実行する際にDRIVE_SERVICE_ACCOUNT_FILEを読むため必要
      - ./backend/secrets:/app/secrets
    depends_on:
      - db
      - redis

  # `POST /api/ingest/gdrive`がenqueueしたGoogle Drive取り込みジョブを処理するARQ worker。
  ingest_worker:
    build:
      context: ./backend
      dockerfile: docker/ingest_worker/Dockerfile.local
    env_file:
      - backend/.env
    environment:
      # DB_HOST/REDIS_URLの上書き理由はapiサービスと同じ（.envの既定値はホスト単体実行用のため）
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/src:/app/src
      # DRIVE_SERVICE_ACCOUNT_FILEはこのディレクトリ配下の相対パスを指定する（README参照）
      - ./backend/secrets:/app/secrets
    depends_on:
      - db
      - redis

volumes:
  db_data:
