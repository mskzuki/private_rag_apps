services:
  db:
    build:
      context: ./backend/docker/db
      dockerfile: Dockerfile.local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_pass
      - POSTGRES_DB=rag_db
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend/docker/api
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://rag_user:rag_pass@db:5432/rag_db
    volumes:
      - ./seed:/app/seed
    depends_on:
      - db

volumes:
  db_data:
