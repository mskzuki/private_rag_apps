name: Eval CI

on:
  pull_request:
    paths:
      - 'backend/src/private_rag_apps/prompts/**'
      - 'backend/src/private_rag_apps/retrieval/**'
      - 'backend/src/private_rag_apps/ingestion/**'
      - 'backend/src/private_rag_apps/generation/**'
      - 'backend/src/private_rag_apps/evals/**'
      - 'backend/evals/**'
      - 'backend/src/private_rag_apps/core/config.py'

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres (pg_bigm入りカスタムイメージ。docker-compose.yml/Dockerfile.local を再利用)
        run: docker compose up -d db

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U rag_user -d rag_dev && exit 0
            sleep 2
          done
          echo "Postgres did not become ready in time" && exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync

      - name: Migrate Database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+psycopg://rag_user:rag_pass@localhost:5432/rag_dev
        run: uv run alembic upgrade head
        
      - name: Ingest Seed Corpus
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+psycopg://rag_user:rag_pass@localhost:5432/rag_dev
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: uv run python -m private_rag_apps.cli.main ingest

      - name: Run M3 Eval
        id: eval
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+psycopg://rag_user:rag_pass@localhost:5432/rag_dev
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run python -m private_rag_apps.evals
          
      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (fs.existsSync('backend/evals/reports/latest_summary.md')) {
              const report = fs.readFileSync('backend/evals/reports/latest_summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

      - name: Stop Postgres
        if: always()
        run: docker compose down -v
